<!DOCTYPE html>
<html>
<meta charset="utf-8">

<head>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.0.13/dist/css/select2.min.css" />

        <p>Following frameworks</p>
       </div>
    </div>
    <div id="container" class="row">
      <div class="col-2 align-self-start">
        <input id="toggle-levels-baseline" type="checkbox" checked data-toggle="toggle" data-on="Custom" data-off="Framework" data-onstyle="info" data-offstyle="warning">
      </div>
      <div class="col-10"></div>
      <div class="col-md-6 col-sm-12">
        <div style="position: relative; width:85%"> <canvas id="chart"></canvas> </div>
      </div>
      <div class="col-md-6 col-sm-12">
        <div id="levels-dropdown" class="row"></div>
        <div id="levels-explain" class="row"></div>
        <hr/>
        <div id="user-data" class="row">
          <div id="levels-details" class="row"></div>
        </div>
      </div>
      <div class="col-md-12 col-sm-12"></div>
    </div>
    <div id="footer" class="row">
      <div class="col-12">
         Engineering Ladder Framework by Francisco | Developed by Ines Matos | Github | 2024
      </div>
  
    </div>

  <script src="./ejs.min.js"></script>
  
  <script src="./templates/helpers.js"></script>
  <script src="./templates/levels-table.precompiled.js"></script>
  <script src="./templates/levels-selector.precompiled.js"></script>
  <script src="./templates/user-data.precompiled.js"></script>
  <script src="./templates/index.js"></script>
  <script src="./framework-levels.js"></script>
  <script src="./custom-levels.js"></script>
  <script src="./chart.js"></script>
  <script src="./index.js"></script>
