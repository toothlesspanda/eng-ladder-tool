<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Engineering Ladder Tool</title>
  <!-- Base: tokens and reset must come first -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <!-- Per-section styles -->
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/roles.css">
  <link rel="stylesheet" href="styles/assessment.css">
  <link rel="stylesheet" href="styles/levels.css">
  <link rel="stylesheet" href="styles/welcome.css">
  <link rel="stylesheet" href="styles/footer.css">
  <link rel="stylesheet" href="styles/journal.css">
</head>
<body>
  <header id="header"></header>

  <main id="main">
    <!-- Populated by renderApp() or renderWelcome() on boot -->
  </main>

  <footer>
    Engineering Ladders framework by
    <a href="https://www.engineeringladders.com/" target="_blank">engineeringladders.com</a>
    &mdash; 2024
  </footer>

  <!-- Only external dependency: Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Shared utilities -->
  <script src="utils.js"></script>

  <!-- Data layer (load order matters: default_framework → store → state → journal) -->
  <script src="lib/default_framework.js"></script>
  <script src="lib/store.js"></script>
  <script src="lib/state.js"></script>
  <script src="lib/journal.js"></script>

  <!-- Chart -->
  <script src="chart/radar.js"></script>

  <!-- UI modules (levels before roles because roles calls renderLevelsTable) -->
  <script src="ui/levels.js"></script>
  <script src="ui/roles.js"></script>
  <script src="ui/assessment.js"></script>
  <script src="ui/header.js"></script>
  <script src="ui/welcome.js"></script>
  <script src="ui/journal.js"></script>

  <!-- Entry point -->
  <script src="main.js"></script>
</body>
</html>
